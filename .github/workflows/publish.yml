name: Publish to npm

# Push a semver tag (`v1.0.0`, `v1.2.3-rc.1`) and this workflow tests,
# builds, verifies that the tag matches `cli/package.json`'s version,
# and publishes to npm with provenance.
#
# Required one-time setup on the repo:
#   - Configure a trusted publisher on npmjs.com bound to this repo +
#     workflow filename `publish.yml`. The runner upgrades npm to >=11.5
#     so it can mint an OIDC token at publish time — no NPM_TOKEN needed.
#   - Optional fallback: set NPM_TOKEN secret (Classic Automation token);
#     the publish step picks it up via NODE_AUTH_TOKEN when present.
#     Provenance attaches either way.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: # also allow a manual run from the Actions tab

permissions:
  contents: read
  id-token: write # required for npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing (requires npm >= 11.5)
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG."
            echo "Bump cli/package.json to $TAG (or retag to v$PKG) and try again."
            exit 1
          fi
          echo "Tag and package.json agree: $PKG"

      - name: Publish (OIDC via trusted publisher; NPM_TOKEN fallback if set)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
